<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>계정관리 | Hwaseon URL</title>
  <link rel="stylesheet" href="dashboard.css" />
  <style>
    .admin-main { max-width: 700px; margin: 0 auto; padding: 24px 20px; }

    .admin-card { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 24px; margin-bottom: 16px; box-shadow: var(--shadow); }
    .admin-card-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 18px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }

    /* 사용자 등록 폼 */
    .user-form { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
    .user-form-field { flex: 1; min-width: 140px; }
    .user-form-field label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 6px; }
    .user-form-field input { width: 100%; padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 7px; font-size: 13px; font-family: inherit; outline: none; transition: border-color .2s; box-sizing: border-box; }
    .user-form-field input:focus { border-color: var(--brand); }
    .form-msg { margin-top: 10px; font-size: 13px; padding: 8px 12px; border-radius: 6px; display: none; }
    .form-msg--success { background: #d1fae5; color: #065f46; display: block; }
    .form-msg--error   { background: #fee2e2; color: #991b1b; display: block; }

    /* 사용자 테이블 */
    .user-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .user-table th { text-align: left; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; padding: 10px 12px; border-bottom: 1.5px solid var(--border); }
    .user-table td { padding: 12px 12px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
    .user-table tbody tr:last-child td { border-bottom: none; }
    .user-table tbody tr:hover td { background: var(--bg); }

    .badge { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; }
    .badge--admin { background: #eff6ff; color: var(--brand); }
    .badge--user  { background: var(--bg); color: var(--muted); }

    /* 토스트는 dashboard.css 공용 */
  </style>
</head>
<body>

<!-- ── 사이트 헤더 ── -->
<header class="site-header">
  <div class="header-inner">
    <a class="brand-logo" href="/">Hwaseon URL</a>
    <nav class="site-nav">
      <a href="/" title="단축키: N">URL 줄이기</a>
      <a href="/dashboard">대시보드</a>
      <span style="color:var(--text);font-size:14px;font-weight:700;">계정관리</span>
      <span class="nav-id" id="adminName">로딩 중…</span>
      <button id="logoutBtn" class="btn btn--danger btn--sm">로그아웃</button>
    </nav>
  </div>
</header>

<!-- ── 메인 ── -->
<main class="admin-main">

  <!-- 카드 1: 새 사용자 등록 -->
  <section class="admin-card">
    <div class="admin-card-title">새 사용자 등록</div>
    <form class="user-form" id="createUserForm" autocomplete="off">
      <div class="user-form-field">
        <label for="newUsername">아이디</label>
        <input type="text" id="newUsername" placeholder="아이디 입력" required />
      </div>
      <div class="user-form-field">
        <label for="newPassword">비밀번호</label>
        <input type="password" id="newPassword" placeholder="비밀번호 입력" required />
      </div>
      <button type="submit" class="btn btn--primary btn--sm" style="margin-bottom:1px;">생성</button>
    </form>
    <div class="form-msg" id="createMsg"></div>
  </section>

  <!-- 카드 2: 사용자 목록 -->
  <section class="admin-card">
    <div class="admin-card-title">사용자 목록</div>
    <table class="user-table">
      <thead>
        <tr>
          <th>아이디</th>
          <th>가입일</th>
          <th>권한</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="usersTableBody">
        <tr><td colspan="4" style="color:var(--muted);text-align:center;padding:20px;">불러오는 중…</td></tr>
      </tbody>
    </table>
  </section>

</main>

<!-- 토스트 -->
<div class="toast-container" id="toastContainer"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  checkAuth();
  loadUsers();

  document.getElementById('createUserForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('newUsername').value.trim();
    const password = document.getElementById('newPassword').value;
    const msg = document.getElementById('createMsg');
    msg.className = 'form-msg';
    if (!username || !password) { showMsg(msg, '아이디와 비밀번호를 입력해주세요.', false); return; }
    try {
      const r = await fetch('/api/admin/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ username, password })
      });
      const d = await r.json();
      if (d.success) {
        showMsg(msg, '사용자가 생성되었습니다.', true);
        document.getElementById('createUserForm').reset();
        loadUsers();
      } else {
        showMsg(msg, d.message || '생성 실패', false);
      }
    } catch { showMsg(msg, '서버 오류가 발생했습니다.', false); }
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch('/api/logout', { method: 'POST', credentials: 'include' });
    location.href = '/login';
  });
});

async function checkAuth() {
  try {
    const r = await fetch('/api/admin/auth', { credentials: 'include' });
    const d = await r.json();
    if (!d.success || !d.isAdmin) { location.href = '/login'; return; }
  } catch { location.href = '/login'; return; }

  try {
    const r = await fetch('/api/me', { credentials: 'include' });
    const d = await r.json();
    if (d.isAuthenticated) document.getElementById('adminName').textContent = d.user.username;
  } catch {}
}

async function loadUsers() {
  try {
    const r = await fetch('/api/admin/users', { credentials: 'include' });
    const d = await r.json();
    if (d.success && d.users) renderUsers(d.users);
  } catch {}
}

function renderUsers(users) {
  const tbody = document.getElementById('usersTableBody');
  if (!users.length) {
    tbody.innerHTML = '<tr><td colspan="4" style="color:var(--muted);text-align:center;padding:20px;">사용자 없음</td></tr>';
    return;
  }
  tbody.innerHTML = users.map(u => `
    <tr>
      <td style="font-weight:600;">${escHtml(u.username)}</td>
      <td style="color:var(--muted);">${u.createdAt ? new Date(u.createdAt).toLocaleDateString('ko-KR') : '—'}</td>
      <td>
        <span class="badge ${u.isAdmin ? 'badge--admin' : 'badge--user'}">
          ${u.isAdmin ? '관리자' : '일반'}
        </span>
      </td>
      <td>
        ${u.isAdmin ? '' : `<button class="btn btn--danger btn--sm" onclick="deleteUser('${u.id}','${escHtml(u.username)}')">삭제</button>`}
      </td>
    </tr>
  `).join('');
}

async function deleteUser(id, name) {
  if (!confirm(`"${name}" 계정을 삭제하시겠습니까?`)) return;
  try {
    const r = await fetch(`/api/admin/users/${id}`, { method: 'DELETE', credentials: 'include' });
    const d = await r.json();
    if (d.success) { showToast('삭제됐습니다.'); loadUsers(); }
    else showToast(d.message || '삭제 실패', 'error');
  } catch { showToast('서버 오류가 발생했습니다.', 'error'); }
}

function showMsg(el, msg, ok) {
  el.textContent = msg;
  el.className = `form-msg form-msg--${ok ? 'success' : 'error'}`;
  setTimeout(() => { el.textContent = ''; el.className = 'form-msg'; }, 4000);
}

function showToast(msg, type = 'success') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast-item${type === 'error' ? ' toast-item--error' : ''}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
