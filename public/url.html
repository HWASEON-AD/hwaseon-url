<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hwaseon URL</title>
  <link rel="stylesheet" href="url.css" />
</head>
<body>

  <!-- 비로그인 화면 -->
  <div class="container" id="guestView" style="display:none">
    <h1>Hwaseon URL</h1>
    <p class="guest-desc">URL 단축 서비스 이용을 위해<br>로그인이 필요합니다.</p>
    <button class="btn-full" onclick="location.href='/login'">로그인</button>
  </div>

  <!-- 로그인 후 화면 -->
  <div class="container" id="userView" style="display:none">
    <div class="login-status" id="loginStatus"></div>
    <h1>URL 단축</h1>
    <div class="input-group">
      <input type="text" id="longUrl" placeholder="긴 URL을 입력하세요" autocomplete="off" />
      <button type="button" id="shortenBtn">단축</button>
    </div>
    <div class="domain-group">
      <label for="domainSelect">도메인 선택</label>
      <select id="domainSelect"></select>
    </div>
    <div class="result" id="resultBox" style="display:none">
      <span id="shortUrl"></span>
      <button type="button" id="copyBtn">복사</button>
    </div>
    <div class="bottom-nav">
      <button type="button" class="btn-outline" onclick="location.href='/dashboard'">대시보드</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
