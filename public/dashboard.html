<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대시보드 | Hwaseon URL</title>
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>

<!-- ── 사이트 헤더 ── -->
<header class="site-header">
  <div class="header-inner">
    <a class="brand-logo" href="/">Hwaseon URL</a>
    <nav class="site-nav">
      <a href="/multiple">다중 단축</a>
      <span id="nav-admin-link" style="display:none;"><a href="/admin">계정관리</a></span>
      <span class="nav-id" id="userName">로딩 중…</span>
      <button id="logoutBtn" class="btn btn--danger btn--sm">로그아웃</button>
    </nav>
  </div>
</header>

<!-- ── 메인 ── -->
<main class="main">

  <!-- 액션바 -->
  <div class="dashboard-actions topbar">
    <button id="deleteAllBtn" class="btn btn--danger btn--sm">전체 삭제</button>
    <button id="downloadExcelBtn" class="btn btn--outline btn--sm">엑셀 다운로드</button>
  </div>

  <!-- 검색 -->
  <div class="filter-bar">
    <input type="text" id="searchInput" class="filter-input" placeholder="URL, 메모, 도메인 검색…" oninput="filterAndRender()" />
    <button class="btn btn--ghost btn--sm" onclick="clearSearch()">✕</button>
  </div>

  <!-- 도메인 탭 -->
  <div id="domainTabs"></div>

  <!-- 테이블 -->
  <div class="dashboard-table-wrap">
    <table class="dashboard-table">
      <thead>
        <tr>
          <th style="width:4%"></th>
          <th style="width:14%">Short URL</th>
          <th style="width:26%">Long URL</th>
          <th style="width:12%">도메인</th>
          <th style="width:8%">오늘</th>
          <th style="width:8%">누적</th>
          <th style="width:10%">사용자</th>
          <th style="width:10%">관리</th>
          <th style="width:8%">상세</th>
        </tr>
      </thead>
      <tbody id="dashboard-tbody"></tbody>
    </table>
  </div>

</main>

<!-- 토스트 컨테이너 -->
<div class="toast-container" id="toastContainer"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="dashboard.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    fetch('/api/me', { method: 'GET', credentials: 'include', headers: { 'Cache-Control': 'no-cache' } })
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(data => {
        if (!data.success || !data.isAuthenticated) { window.location.replace('/login'); return; }
        document.getElementById('userName').textContent = data.user.username;
        if (data.user.isAdmin) {
          document.getElementById('nav-admin-link').style.display = 'inline';
        }
      })
      .catch(() => window.location.replace('/login'));

    document.getElementById('logoutBtn').addEventListener('click', () => {
      fetch('/api/logout', { method: 'POST', credentials: 'include' })
        .then(r => r.json()).then(() => window.location.replace('/login'))
        .catch(() => window.location.replace('/login'));
    });
  });
</script>
</body>
</html>
